<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Virtual Joystick</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#ececef;
    font-family:Arial;
}

.joystick-wrapper{
    position:relative;
    width:320px;
    height:320px;
}

.base{
    position:absolute;
    width:260px;
    height:260px;
    left:30px;
    top:30px;
    border-radius:50%;

    background:linear-gradient(145deg,#f7f7f7,#d5d5d5);
    
    box-shadow:
        -12px -12px 24px rgba(255,255,255,.8),
         12px 12px 24px rgba(0,0,0,.15);
}

.inner{
    position:absolute;
    width:210px;
    height:210px;
    left:55px;
    top:55px;
    border-radius:50%;

    background:linear-gradient(
        180deg,
        #d7d7da,
        #b8b8bc
    );
    
    box-shadow:
        inset -8px -8px 16px rgba(255,255,255,.7),
        inset 10px 10px 18px rgba(0,0,0,.2);
}

.stick{

    position:absolute;
    
    width:110px;
    height:110px;
    
    left:105px;
    top:105px;
    
    border-radius:50%;
    
    background:
        linear-gradient(
            180deg,
            #ffffff,
            #d8d8d8
        );
    
    box-shadow:
        0 10px 20px rgba(0,0,0,.2),
        inset 0 2px 3px rgba(255,255,255,.9);
    
    cursor:grab;
    user-select:none;
}

.dot{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#cfcfcf;
}

.dot-top{
    top:15px;
    left:50%;
    transform:translateX(-50%);
}

.dot-right{
    right:15px;
    top:50%;
    transform:translateY(-50%);
}

.dot-bottom{
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
}

.dot-left{
    left:15px;
    top:50%;
    transform:translateY(-50%);
}

.arrow{
    position:absolute;
    color:#cfcfcf;
    font-size:40px;
    font-weight:bold;
    user-select:none;
}

.arrow-top{
    top:-20px;
    left:50%;
    transform:translateX(-50%);
}

.arrow-bottom{
    bottom:-20px;
    left:50%;
    transform:translateX(-50%);
}

.arrow-left{
    left:-10px;
    top:50%;
    transform:translateY(-50%);
}

.arrow-right{
    right:-10px;
    top:50%;
    transform:translateY(-50%);
}

.info{
    margin-top:30px;
    text-align:center;
    font-size:18px;
    line-height:32px;
}

.value{
    font-weight:bold;
}

</style>
</head>

<body>

<div class="joystick-wrapper">

    <div class="arrow arrow-top">⌃</div>
    <div class="arrow arrow-bottom">⌄</div>
    <div class="arrow arrow-left">‹</div>
    <div class="arrow arrow-right">›</div>
    
    <div class="base"></div>
    <div class="inner"></div>
    
    <div class="stick" id="stick">
    
        <div class="dot dot-top"></div>
        <div class="dot dot-right"></div>
        <div class="dot dot-bottom"></div>
        <div class="dot dot-left"></div>
    
    </div>

</div>

<div class="info">

X:
<span id="x" class="value">0</span>

<br>

Y:
<span id="y" class="value">0</span>

<br>

Angle:
<span id="angle" class="value">0°</span>

<br>

Direction:
<span id="dir" class="value">CENTER</span>

</div>

<script>

const stick = document.getElementById("stick");

const xText = document.getElementById("x");
const yText = document.getElementById("y");
const angleText = document.getElementById("angle");
const dirText = document.getElementById("dir");

let dragging = false;

const centerX = 105;
const centerY = 105;
const maxRadius = 50;

stick.addEventListener("mousedown", function(e){

    dragging = true;
    
    stick.style.cursor = "grabbing";
    
    e.preventDefault();

});

document.addEventListener("mousemove", function(e){

    if(!dragging) return;
    
    const wrapper =
        document.querySelector(".joystick-wrapper")
        .getBoundingClientRect();
    
    const cx =
        wrapper.left + wrapper.width / 2;
    
    const cy =
        wrapper.top + wrapper.height / 2;
    
    let dx = e.clientX - cx;
    let dy = e.clientY - cy;
    
    const distance =
        Math.sqrt(dx*dx + dy*dy);
    
    if(distance > maxRadius){
    
        dx = dx / distance * maxRadius;
        dy = dy / distance * maxRadius;
    }
    
    stick.style.left =
        centerX + dx + "px";
    
    stick.style.top =
        centerY + dy + "px";
    
    const x =
        (dx / maxRadius).toFixed(2);
    
    const y =
        (dy / maxRadius).toFixed(2);
    
    xText.innerText = x;
    yText.innerText = y;
    
    const angle =
        Math.atan2(dy,dx) *
        180 / Math.PI;
    
    angleText.innerText =
        Math.round(angle) + "°";
    
    let direction = "CENTER";
    
    if(Math.abs(dx) > 10 ||
       Math.abs(dy) > 10){
    
        if(Math.abs(dx) >
           Math.abs(dy)){
    
            direction =
                dx > 0 ?
                "RIGHT" :
                "LEFT";
        }
        else{
    
            direction =
                dy > 0 ?
                "DOWN" :
                "UP";
        }
    }
    
    dirText.innerText =
        direction;

});

document.addEventListener("mouseup", function(){

    if(!dragging) return;
    
    dragging = false;
    
    stick.style.cursor = "grab";
    
    stick.style.transition =
        "all .15s ease";
    
    stick.style.left =
        centerX + "px";
    
    stick.style.top =
        centerY + "px";
    
    xText.innerText = "0";
    yText.innerText = "0";
    angleText.innerText = "0°";
    dirText.innerText = "CENTER";
    
    setTimeout(()=>{
        stick.style.transition = "";
    },150);

});

</script>

</body>
</html>
